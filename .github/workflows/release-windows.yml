name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0)"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout arimo (Stage 1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Checkout arimo-bootstrap (Stage 0)
        uses: actions/checkout@v4
        with:
          repository: egecanakincioglu/arimo-bootstrap
          path: arimo-bootstrap

      - name: Install MSYS2 + MinGW + LLVM 21
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-clang

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LLVM_SYS_211_PREFIX=C:/msys64/mingw64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust (gnu target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            arimo-bootstrap/target
          key: windows-gnu-rust-${{ hashFiles('arimo-bootstrap/Cargo.lock') }}

      - name: Build Stage 0 (arc compiler — Windows)
        working-directory: arimo-bootstrap
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Compile Stage 1 with Stage 0
        shell: pwsh
        run: |
          $arc0 = "arimo-bootstrap\target\x86_64-pc-windows-gnu\release\arc.exe"
          $stdlibDst = "arimo-bootstrap\target\x86_64-pc-windows-gnu\release\stdlib"
          Copy-Item -Recurse -Force "arimo\stdlib" $stdlibDst
          Push-Location arimo
          & "..\$arc0" build
          Pop-Location

      - name: Verify arc.exe
        shell: pwsh
        run: |
          if (-not (Test-Path "arimo\arc.exe")) {
            Write-Error "arc.exe not found — build failed"
            exit 1
          }
          Write-Host "arc.exe produced successfully"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          Push-Location arimo
          & $iscc "packaging\arc-setup.iss"
          Pop-Location

      - name: Create zip package
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $dir = "arimo\dist\arimo-windows-x64"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "arimo\arc.exe" "$dir\"
          Copy-Item -Recurse "arimo\stdlib" "$dir\stdlib"
          Compress-Archive -Path "$dir\*" -DestinationPath "arimo\dist\arimo-$tag-windows-x64.zip" -Force

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          gh release upload $tag `
            "arimo\dist\arimo-$tag-windows-x64-setup.exe" `
            "arimo\dist\arimo-$tag-windows-x64.zip" `
            --repo egecanakincioglu/arimo `
            --clobber
