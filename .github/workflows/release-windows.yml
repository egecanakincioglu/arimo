name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to (e.g. v1.0)"
        required: true
        default: "v1.0"
      bootstrap_tag:
        description: "arc bootstrap binary tag to download (e.g. v1.0)"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout arimo (Stage 1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Download bootstrap arc binary
        shell: pwsh
        run: |
          $btag = "${{ github.event.inputs.bootstrap_tag }}"
          New-Item -ItemType Directory -Force arc-bootstrap | Out-Null
          gh release download $btag `
            --repo egecanakincioglu/arimo `
            --pattern "arimo-$btag-windows-x64.zip" `
            --output arc-bootstrap.zip
          Expand-Archive arc-bootstrap.zip -DestinationPath arc-bootstrap
          Write-Host "Bootstrap arc:"
          & "arc-bootstrap\arc.exe" 2>&1 | Select-Object -First 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Stage 1 with bootstrap arc
        shell: pwsh
        run: |
          $arc0 = (Resolve-Path "arc-bootstrap\arc.exe").Path
          $stdlibSrc = (Resolve-Path "arimo\stdlib").Path
          $arcDir = Split-Path $arc0
          if (-not (Test-Path "$arcDir\stdlib")) {
            Copy-Item -Recurse $stdlibSrc "$arcDir\stdlib"
          }
          Push-Location arimo
          & $arc0 build
          if (-not (Test-Path "arc.exe")) {
            Write-Error "arc.exe not produced — build failed"
            exit 1
          }
          Write-Host "arc.exe produced: $((Get-Item arc.exe).Length) bytes"
          Pop-Location

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          Push-Location arimo
          New-Item -ItemType Directory -Force dist | Out-Null
          & $iscc "packaging\arc-setup.iss"
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC failed"; exit 1 }
          Pop-Location

      - name: Create zip package
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $dir = "arimo\dist\arimo-windows-x64"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "arimo\arc.exe" "$dir\"
          Copy-Item -Recurse "arimo\stdlib" "$dir\stdlib"
          Compress-Archive -Path "$dir\*" -DestinationPath "arimo\dist\arimo-$tag-windows-x64.zip" -Force

      - name: Upload to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          gh release upload $tag `
            "arimo\dist\arimo-$tag-windows-x64-setup.exe" `
            "arimo\dist\arimo-$tag-windows-x64.zip" `
            --repo egecanakincioglu/arimo `
            --clobber
