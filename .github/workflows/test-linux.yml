name: Test Linux (V1 CI)

on:
  push:
    branches: [main]
    paths:
      - "arimo/compiler/**"
      - "arimo/compiler/backend/**"
      - "Main.arm"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout arimo (V1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Checkout arimo-bootstrap (Stage 0)
        uses: actions/checkout@v4
        with:
          repository: egecanakincioglu/arimo-bootstrap
          path: arimo-bootstrap

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 22
          sudo apt-get install -y llvm-22-dev libclang-22-dev clang-22
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            arimo-bootstrap/target
          key: linux-ci-${{ hashFiles('arimo-bootstrap/Cargo.lock') }}

      - name: Build Stage 0 (bootstrap)
        working-directory: arimo-bootstrap
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Stage 1 (self-hosted)
        working-directory: arimo
        run: |
          ARC0="../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/arc"
          chmod +x "$ARC0"
          cp -r stdlib "../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/"
          "$ARC0" build --target linux
          chmod +x arc

      - name: Verify S2→S3 determinism
        working-directory: arimo
        run: |
          cp arc /tmp/arc.s2
          /tmp/arc.s2 build --target linux
          cp arc /tmp/arc.s3
          diff /tmp/arc.s2 /tmp/arc.s3 && echo "DETERMINISTIC" || { echo "FAIL: non-deterministic"; exit 1; }

      - name: Run core test suite
        working-directory: arimo/test
        run: |
          ARC="../arc"
          FAIL=0
          for f in *.arm; do
            out="${f%.arm}"
            "$ARC" "$f" --target linux 2>&1 | tail -1
            if [ -f "$out" ]; then
              chmod +x "$out" && ./"$out" >/dev/null 2>&1 || { echo "FAIL: $f"; FAIL=1; }
              rm -f "$out"
            else
              echo "FAIL(compile): $f"; FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All core tests pass" || exit 1
