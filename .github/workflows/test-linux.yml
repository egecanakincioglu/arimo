name: Test Linux (V1 CI)

on:
  push:
    branches: [main]
    paths:
      - "arimo/compiler/**"
      - "arimo/compiler/backend/**"
      - "Main.arm"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout arimo (V1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Checkout arimo-bootstrap (Stage 0)
        uses: actions/checkout@v4
        with:
          repository: egecanakincioglu/arimo-bootstrap
          path: arimo-bootstrap

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 22
          sudo apt-get install -y llvm-22-dev libclang-22-dev clang-22 libpolly-22-dev libffi-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            arimo-bootstrap/target
          key: linux-ci-${{ hashFiles('arimo-bootstrap/Cargo.lock') }}

      - name: Build Stage 0 (bootstrap)
        working-directory: arimo-bootstrap
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Stage 1 (self-hosted)
        working-directory: arimo
        run: |
          ARC0="../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/arc"
          chmod +x "$ARC0"
          cp -r stdlib "../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/"
          "$ARC0" build --target linux
          chmod +x arc

      - name: Run core test suite (S1)
        working-directory: arimo/test
        run: |
          ARC="../arc"
          FAIL=0
          for f in *.arm; do
            out="${f%.arm}"
            echo -n "$f → "
            "$ARC" "$f" --target linux 2>&1 | tail -1
            if [ -f "$out" ]; then
              chmod +x "$out"
              # Check binary runs without crash (any exit code OK, non-0 = test returning value)
              if ./"$out" >/dev/null 2>&1; then
                echo "  OK"
              else
                ret=$?
                # SIGSEGV=139, SIGILL=132, SIGABRT=134 are crashes
                if [ $ret -ge 132 ] && [ $ret -le 139 ]; then
                  echo "  FAIL: $f (crash, exit $ret)"
                  FAIL=1
                else
                  echo "  OK (exit $ret)"
                fi
              fi
              rm -f "$out"
            else
              echo "  FAIL: $f (compile)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All core tests pass" || exit 1

      - name: Verify S3→S4 determinism (self-hosted chain)
        working-directory: arimo
        run: |
          cp arc /tmp/arc.s1
          echo "=== S1 binary: $(stat -c%s /tmp/arc.s1) bytes ==="
          file /tmp/arc.s1
          echo "=== S1→S2 build (bootstrap-built → self-hosted) ==="
          /tmp/arc.s1 build --target linux 2>&1
          cp arc /tmp/arc.s2
          echo "=== S2 binary: $(stat -c%s /tmp/arc.s2) bytes ==="
          file /tmp/arc.s2
          echo "=== S2→S3 build ==="
          /tmp/arc.s2 build --target linux 2>&1
          cp arc /tmp/arc.s3
          echo "=== S3 binary: $(stat -c%s /tmp/arc.s3) bytes ==="
          file /tmp/arc.s3
          diff /tmp/arc.s2 /tmp/arc.s3 && echo "S2==S3 DETERMINISTIC" || echo "S2≠S3 (bootstrap→self-hosted — expected)"
          echo "=== S3→S4 build (second self-hosted) ==="
          /tmp/arc.s3 build --target linux 2>&1
          cp arc /tmp/arc.s4
          echo "=== S4 binary: $(stat -c%s /tmp/arc.s4) bytes ==="
          file /tmp/arc.s4
          diff /tmp/arc.s3 /tmp/arc.s4 && echo "S3==S4 DETERMINISTIC ✓" || { echo "FAIL: S3≠S4 non-deterministic"; exit 1; }

      - name: Verify S3 is static (self-hosted = no libc dependency)
        run: |
          S3=/tmp/arc.s3
          echo "=== file ==="
          file "$S3"
          echo "=== ldd ==="
          ldd "$S3" 2>&1 || true
          echo "=== readelf -l ==="
          readelf -l "$S3" 2>/dev/null | grep -E "INTERP|LOAD|DYNAMIC" || true

          echo ""
          if file "$S3" | grep -q "dynamically linked"; then
            echo "WARN: S3 is dynamically linked (bootstrap codegen via gcc)"
            echo "This is expected for S1/S2 but self-hosted S3+ should be static."
          elif file "$S3" | grep -q "statically linked"; then
            echo "✅ S3 is statically linked — self-hosted native binary"
          fi

          if readelf -l "$S3" 2>/dev/null | grep -q "INTERP"; then
            echo "WARN: S3 has INTERP segment (dynamic linker)"
          else
            echo "✅ S3 has no INTERP segment — no dynamic linker dependency"
          fi
