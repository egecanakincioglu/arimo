name: Release Linux (V1 Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0)"
        required: true
        default: "v1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout arimo (V1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Checkout arimo-bootstrap (Stage 0)
        uses: actions/checkout@v4
        with:
          repository: egecanakincioglu/arimo-bootstrap
          path: arimo-bootstrap

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 22
          sudo apt-get install -y llvm-22-dev libclang-22-dev clang-22 libpolly-22-dev libffi-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            arimo-bootstrap/target
          key: linux-v1-${{ hashFiles('arimo-bootstrap/Cargo.lock') }}

      - name: Build Stage 0 (bootstrap)
        working-directory: arimo-bootstrap
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Stage 1 (self-hosted Linux)
        working-directory: arimo
        run: |
          ARC0="../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/arc"
          chmod +x "$ARC0"
          cp -r stdlib "../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/"
          "$ARC0" build --target linux
          chmod +x arc
          cp arc ../arc-linux

      - name: Run test suite (smoke test)
        working-directory: arimo/test
        run: |
          ARC="/home/runner/work/arimo/arimo/arimo/arc"
          cp -r ../stdlib /tmp/
          "$ARC" hello.arm --target linux 2>&1 | tail -1
          chmod +x hello && ./hello
          echo "Smoke test passed"

      - name: Install packaging tools
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Package Linux release
        working-directory: arimo
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          mkdir -p dist/arimo-linux-x64/stdlib
          cp arc dist/arimo-linux-x64/
          cp -r stdlib/. dist/arimo-linux-x64/stdlib/

          cat > dist/arimo-linux-x64/install.sh << 'INSTALL'
          #!/bin/bash
          set -e
          if [ "$(id -u)" -ne 0 ]; then
            echo "Run with sudo: sudo ./install.sh"
            exit 1
          fi
          cp arc /usr/local/bin/arc
          chmod +x /usr/local/bin/arc
          mkdir -p /usr/local/lib/arimo
          cp -r stdlib /usr/local/lib/arimo/
          echo "Arimo v1 installed. Run: arc --version"
          INSTALL
          chmod +x dist/arimo-linux-x64/install.sh

          cd dist
          tar -czf "arimo-${TAG}-linux-x64.tar.gz" arimo-linux-x64/
          cd ..

          mkdir -p pkg-root/usr/local/bin
          mkdir -p pkg-root/usr/local/lib/arimo/stdlib
          cp arc pkg-root/usr/local/bin/arc
          cp -r stdlib/. pkg-root/usr/local/lib/arimo/stdlib/

          fpm -s dir -t deb -n arimo -v "${VERSION}" --architecture amd64 \
            --description "Arimo programming language compiler v1 — self-hosted native compiler" \
            --url "https://github.com/egecanakincioglu/arimo" \
            --maintainer "Egecan Akıncıoğlu <dev@egecanakincioglu.com>" \
            --license "AGPL-3.0" --prefix / -C pkg-root \
            -p "dist/arimo-${TAG}-linux-x64.deb" .

          fpm -s dir -t rpm -n arimo -v "${VERSION}" --architecture x86_64 \
            --description "Arimo programming language compiler v1 — self-hosted native compiler" \
            --url "https://github.com/egecanakincioglu/arimo" \
            --maintainer "Egecan Akıncıoğlu <dev@egecanakincioglu.com>" \
            --license "AGPL-3.0" --prefix / -C pkg-root \
            -p "dist/arimo-${TAG}-linux-x64.rpm" .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "${TAG}" \
            arimo/dist/arimo-${TAG}-linux-x64.tar.gz \
            arimo/dist/arimo-${TAG}-linux-x64.deb \
            arimo/dist/arimo-${TAG}-linux-x64.rpm \
            --repo egecanakincioglu/arimo \
            --clobber
