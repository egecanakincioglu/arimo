name: Release Linux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
      bootstrap_tag:
        description: "arc bootstrap binary tag to download (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout arimo (Stage 1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Download bootstrap arc binary (v1.0.0)
        run: |
          BTAG=${{ github.event.inputs.bootstrap_tag }}
          mkdir -p arc-bootstrap
          wget -q "https://github.com/egecanakincioglu/arimo/releases/download/${BTAG}/arimo-${BTAG}-linux-x64.tar.gz" \
            -O arc-bootstrap.tar.gz
          tar -xzf arc-bootstrap.tar.gz -C arc-bootstrap --strip-components=1
          chmod +x arc-bootstrap/arc
          echo "Bootstrap arc version:"
          ./arc-bootstrap/arc || true

      - name: Compile Stage 1 with bootstrap arc
        working-directory: arimo
        run: |
          ARC0="$(realpath ../arc-bootstrap/arc)"
          cp -r ../arc-bootstrap/stdlib "$(dirname "$ARC0")/stdlib" 2>/dev/null || true
          "$ARC0" build
          chmod +x arc

      - name: Install fpm
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Package Linux release
        working-directory: arimo
        run: |
          TAG=${{ github.event.inputs.tag }}
          VERSION=${TAG#v}

          mkdir -p dist/arimo-linux-x64/stdlib
          cp arc dist/arimo-linux-x64/
          cp -r stdlib/. dist/arimo-linux-x64/stdlib/

          cat > dist/arimo-linux-x64/install.sh << 'EOF'
          #!/bin/bash
          set -e
          if [ "$(id -u)" -ne 0 ]; then
            echo "Run with sudo: sudo ./install.sh"
            exit 1
          fi
          cp arc /usr/local/bin/arc
          chmod +x /usr/local/bin/arc
          mkdir -p /usr/local/lib/arimo
          cp -r stdlib /usr/local/lib/arimo/
          echo "Arimo installed. Run: arc --version"
          EOF
          chmod +x dist/arimo-linux-x64/install.sh

          # tar.gz
          cd dist
          tar -czf arimo-${TAG}-linux-x64.tar.gz arimo-linux-x64/
          cd ..

          # .deb
          mkdir -p pkg-root/usr/local/bin
          mkdir -p pkg-root/usr/local/lib/arimo/stdlib
          cp arc pkg-root/usr/local/bin/arc
          cp -r stdlib/. pkg-root/usr/local/lib/arimo/stdlib/

          fpm -s dir -t deb \
            -n arimo \
            -v ${VERSION} \
            --architecture amd64 \
            --description "Arimo programming language compiler — arc" \
            --url "https://github.com/egecanakincioglu/arimo" \
            --maintainer "Egecan Akıncıoğlu <egecanakincioglu@icloud.com>" \
            --license "AGPL-3.0" \
            --prefix / \
            -C pkg-root \
            -p dist/arimo-${TAG}-linux-x64.deb \
            .

          # .rpm
          fpm -s dir -t rpm \
            -n arimo \
            -v ${VERSION} \
            --architecture x86_64 \
            --description "Arimo programming language compiler — arc" \
            --url "https://github.com/egecanakincioglu/arimo" \
            --maintainer "Egecan Akıncıoğlu <egecanakincioglu@icloud.com>" \
            --license "AGPL-3.0" \
            --prefix / \
            -C pkg-root \
            -p dist/arimo-${TAG}-linux-x64.rpm \
            .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.inputs.tag }}
          gh release upload ${TAG} \
            arimo/dist/arimo-${TAG}-linux-x64.tar.gz \
            arimo/dist/arimo-${TAG}-linux-x64.deb \
            arimo/dist/arimo-${TAG}-linux-x64.rpm \
            --repo egecanakincioglu/arimo \
            --clobber
