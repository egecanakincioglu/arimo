name: Release Linux (Stage 0 Bootstrap — one-time use)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout arimo (Stage 1 source)
        uses: actions/checkout@v4
        with:
          path: arimo

      - name: Checkout arimo-bootstrap (Stage 0)
        uses: actions/checkout@v4
        with:
          repository: egecanakincioglu/arimo-bootstrap
          path: arimo-bootstrap

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 21
          sudo apt-get install -y llvm-21-dev libclang-21-dev clang-21 libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            arimo-bootstrap/target
          key: linux-rust-${{ hashFiles('arimo-bootstrap/Cargo.lock') }}

      - name: Build Stage 0 (arc compiler — Linux)
        working-directory: arimo-bootstrap
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Compile Stage 1 with Stage 0
        working-directory: arimo
        run: |
          ARC0="../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/arc"
          chmod +x "$ARC0"
          cp -r stdlib "../arimo-bootstrap/target/x86_64-unknown-linux-gnu/release/stdlib"
          "$ARC0" build
          chmod +x arc

      - name: Install fpm
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Package Linux release
        working-directory: arimo
        run: |
          TAG=${{ github.event.inputs.tag }}
          VERSION=${TAG#v}

          mkdir -p dist/arimo-linux-x64/stdlib
          cp arc dist/arimo-linux-x64/
          cp -r stdlib/. dist/arimo-linux-x64/stdlib/

          cat > dist/arimo-linux-x64/install.sh << 'EOF'
          #!/bin/bash
          set -e
          if [ "$(id -u)" -ne 0 ]; then
            echo "Run with sudo: sudo ./install.sh"
            exit 1
          fi
          cp arc /usr/local/bin/arc
          chmod +x /usr/local/bin/arc
          mkdir -p /usr/local/lib/arimo
          cp -r stdlib /usr/local/lib/arimo/
          echo "Arimo installed. Run: arc"
          EOF
          chmod +x dist/arimo-linux-x64/install.sh

          cd dist
          tar -czf arimo-${TAG}-linux-x64.tar.gz arimo-linux-x64/
          cd ..

          mkdir -p pkg-root/usr/local/bin
          mkdir -p pkg-root/usr/local/lib/arimo/stdlib
          cp arc pkg-root/usr/local/bin/arc
          cp -r stdlib/. pkg-root/usr/local/lib/arimo/stdlib/

          fpm -s dir -t deb \
            -n arimo -v ${VERSION} \
            --architecture amd64 \
            --description "Arimo programming language compiler — arc" \
            --url "https://github.com/egecanakincioglu/arimo" \
            --maintainer "Egecan Akıncıoğlu <egecanakincioglu@icloud.com>" \
            --license "AGPL-3.0" \
            --prefix / -C pkg-root \
            -p dist/arimo-${TAG}-linux-x64.deb .

          fpm -s dir -t rpm \
            -n arimo -v ${VERSION} \
            --architecture x86_64 \
            --description "Arimo programming language compiler — arc" \
            --url "https://github.com/egecanakincioglu/arimo" \
            --maintainer "Egecan Akıncıoğlu <egecanakincioglu@icloud.com>" \
            --license "AGPL-3.0" \
            --prefix / -C pkg-root \
            -p dist/arimo-${TAG}-linux-x64.rpm .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.inputs.tag }}
          gh release upload ${TAG} \
            arimo/dist/arimo-${TAG}-linux-x64.tar.gz \
            arimo/dist/arimo-${TAG}-linux-x64.deb \
            arimo/dist/arimo-${TAG}-linux-x64.rpm \
            --repo egecanakincioglu/arimo \
            --clobber
